<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Booking</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #fce4ec);
    padding: 30px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #667eea;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

tr:hover {
    background: #f5f5f5;
}

.btn {
    margin-top: 15px;
    display: inline-block;
    padding: 10px 15px;
    background: #667eea;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

.hapus {
    background: red;
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}

/* tambahan biar detail lebih halus */
small {
    color: #666;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h2>📋 Riwayat Booking</h2>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>No HP</th>
                <th>Waktu</th>
                <th>Paket & Detail</th>
                <th>Background</th>
                <th>Pembayaran</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="dataBooking"></tbody>
    </table>

    <a href="data.html" class="btn">+ Tambah Booking</a>
</div>

<script>
function tampilkanData() {
    const data = JSON.parse(localStorage.getItem("booking")) || [];
    const tbody = document.getElementById("dataBooking");
    tbody.innerHTML = "";

    data.forEach((item, index) => {
        const row = `
        <tr>
            <td>${item.nama}</td>
            <td>${item.hp}</td>
            <td>${item.waktu}</td>
            <td>
                ${item.paket}<br>
                <small>${item.paketDetail}</small>
            </td>
            <td>${item.background}</td>
            <td>${item.pembayaran}</td>
            <td>${item.status}</td>
            <td>
                <button class="hapus" onclick="hapusData(${index})">Hapus</button>
            </td>
        </tr>
        `;
        tbody.innerHTML += row;
    });
}

function hapusData(index) {
    let data = JSON.parse(localStorage.getItem("booking")) || [];
    data.splice(index, 1);
    localStorage.setItem("booking", JSON.stringify(data));
    tampilkanData();
}

tampilkanData();
</script>

</body>
</html>
