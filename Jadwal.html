<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATIHAN BOOTSTRAP</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    
    <h2 class="text-center mb-4">Jadwal Hari Libur</h2>

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            NiNoDi Self Photo Studio
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Tanggal</th>
                            <th>Hari</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>1 Januari 2026</td>
                            <td>Rabu</td>
                            <td class="text-danger fw-bold">Tutup (Tahun Baru)</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>17 Agustus 2026</td>
                            <td>Senin</td>
                            <td class="text-danger fw-bold">Tutup (Hari Kemerdekaan)</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>25 Desember 2026</td>
                            <td>Jumat</td>
                            <td class="text-danger fw-bold">Tutup (Natal)</td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>Setiap Senin</td>
                            <td>-</td>
                            <td class="text-warning fw-bold">Libur Mingguan</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer text-center">
            <small>*Jadwal dapat berubah sewaktu-waktu</small>
        </div>
    </div>

</div>



   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
